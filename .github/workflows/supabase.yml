name: Supabase Pipeline

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Push migrations to the linked FactLockCam project"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase DB
        run: supabase db start

      - name: Apply migrations locally
        run: supabase db reset

      - name: Lint local database
        run: supabase db lint --local --fail-on warning

  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    runs-on: ubuntu-latest
    needs: validate

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.FACTLOCKCAM_SUPABASE_DB_PASSWORD }}
      FACTLOCKCAM_SUPABASE_PROJECT_REF: ${{ secrets.FACTLOCKCAM_SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link FactLockCam project
        run: supabase link --project-ref "$FACTLOCKCAM_SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push
