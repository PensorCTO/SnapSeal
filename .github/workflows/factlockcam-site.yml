name: Deploy FactLockCam marketing site

on:
  push:
    branches: [main]
    paths:
      - 'projects/FactLockCam_Site/**'
      - '.github/workflows/factlockcam-site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: projects/FactLockCam_Site/package-lock.json

      - name: Install and build
        working-directory: projects/FactLockCam_Site
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/FactLockCam_Site
          command: pages deploy dist --project-name=factlockcam --branch=main
